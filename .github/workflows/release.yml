name: Release

# Push a version tag (e.g. v0.1.0) to build the .vsix and publish it to a GitHub
# Release. The in-extension self-updater (S03) polls these releases and side-loads
# the newer .vsix. windows-latest because the bundled claude binary is win32-x64.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write   # to create the Release

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Package the .vsix
        run: npx vsce package

      - name: Publish a single GitHub Release with the .vsix
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          fail_on_unmatched_files: true
